[manager]
ratio          = [ 1, 3, 4 ]
sort_by        = "name"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true

[preview]
tab_size        = 4
max_width       = 1920
max_height      = 1080
image_filter    = "triangle"
image_quality   = 75

[opener]
edit = [
	{ run = '${EDITOR:-nano} "$@"', block = true, for = "unix" }
]
open = [
	{ run = 'xdg-open "$@"', desc = "Open", for = "unix" }
]

[open]
rules = [
	{ mime = "inode/directory", use = [ "edit", "open" ] },
	{ mime = "text/*", use = "edit" },
	{ mime = "image/*", use = "open" },
	{ mime = "video/*", use = "open" },
	{ mime = "application/pdf", use = "open" }
]
